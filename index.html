<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [20, 0],
            zoom: 3,
            zoomControl: true,
            worldCopyJump: false,
            maxBounds: [[-90, -180], [90, 180]],
            maxBoundsViscosity: 1.0,
            minZoom: 2
        });

        // === BASE LAYERS ===

        // Streets (OpenStreetMap)
        const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19,
            noWrap: true
        });

        // Satellite (Esri World Imagery)
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, Maxar, Earthstar Geographics',
            maxZoom: 18,
            noWrap: true
        });

        // Topographic with contour lines (OpenTopoMap - SRTM-based)
        const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data: &copy; OpenStreetMap, SRTM | Style: &copy; OpenTopoMap (CC-BY-SA)',
            maxZoom: 17,
            noWrap: true
        });

        // GEBCO - Global land + ocean bathymetry shaded relief (15 arc-second resolution)
        const gebco = L.tileLayer.wms('https://wms.gebco.net/mapserv?', {
            layers: 'gebco_latest',
            format: 'image/png',
            transparent: false,
            noWrap: true,
            attribution: '&copy; GEBCO Compilation Group — global bathymetry & land relief'
        });

        // Esri Shaded Relief (color-tinted elevation)
        const shadedRelief = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Shaded_Relief/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, USGS',
            maxZoom: 13,
            noWrap: true
        });

        // Esri Ocean Basemap (detailed ocean floor bathymetry)
        const ocean = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, GEBCO, NOAA, National Geographic',
            maxZoom: 13,
            noWrap: true
        });

        // === OVERLAY LAYERS (can be toggled on/off) ===

        // Esri Hillshade overlay (grayscale shadows for 3D terrain feel)
        const hillshade = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Elevation/World_Hillshade/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, USGS',
            maxZoom: 13,
            noWrap: true,
            opacity: 0.35
        });

        // Mundialis SRTM colored hillshade
        const srtmHillshade = L.tileLayer.wms('https://ows.mundialis.de/services/service?', {
            layers: 'SRTM30-Colored-Hillshade',
            format: 'image/png',
            transparent: true,
            noWrap: true,
            opacity: 0.5,
            attribution: '&copy; Mundialis, SRTM'
        });

        // GEBCO sub-ice topography (shows terrain under ice sheets)
        const gebcoSubIce = L.tileLayer.wms('https://wms.gebco.net/mapserv?', {
            layers: 'gebco_latest_sub_ice_topo',
            format: 'image/png',
            transparent: true,
            noWrap: true,
            opacity: 0.5,
            attribution: '&copy; GEBCO — sub-ice topography'
        });

        // Default: GEBCO (most accurate global terrain + ocean)
        gebco.addTo(map);

        // Layer switcher
        L.control.layers({
            'Terrain & Ocean (GEBCO)': gebco,
            'Topographic + Contours': topo,
            'Shaded Relief (Esri)': shadedRelief,
            'Ocean Floor (Esri)': ocean,
            'Satellite': satellite,
            'Streets': streets
        }, {
            'Hillshade Overlay': hillshade,
            'SRTM Colored Hillshade': srtmHillshade,
            'Sub-Ice Topography': gebcoSubIce
        }, { position: 'topright', collapsed: false }).addTo(map);

        // Scale bar
        L.control.scale({ imperial: true, metric: true }).addTo(map);
    </script>
</body>
</html>
